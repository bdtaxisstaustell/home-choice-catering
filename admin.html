<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}

.box {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
}

button {
    padding: 10px;
    margin-top: 5px;
}
</style>
</head>

<body>

<h2>Admin Login</h2>

<div class="box" id="loginBox">
<input type="password" id="pass" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

<h2>Manage Menu</h2>

<div class="box">
<input id="itemName" placeholder="Item Name">
<input id="itemPrice" placeholder="Price">
<button onclick="addItem()">Add Item</button>
</div>

<div class="box">
<h3>Current Items</h3>
<ul id="itemList"></ul>
</div>

</div>

<script>

let password = "trina123"; // change this

let items = [
    {name:"Lamb Akhni", price:14},
    {name:"Chicken Biryani", price:14},
    {name:"Chicken Curry", price:15}
];

function login(){
let p = document.getElementById("pass").value;

if(p === password){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
render();
}else{
alert("Wrong password");
}
}

function render(){
let list="";
items.forEach((item,i)=>{
list += "<li>"+item.name+" (£"+item.price+") "+
"<button onclick='removeItem("+i+")'>Delete</button></li>";
});
document.getElementById("itemList").innerHTML = list;
}

function addItem(){
let name = document.getElementById("itemName").value;
let price = document.getElementById("itemPrice").value;

items.push({name:name, price:price});
render();
}

function removeItem(i){
items.splice(i,1);
render();
}

</script>

</body>
</html>
