<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Spice Catering</title>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: Arial;
    background: #b0e0e6;
}

/* HEADER */
header {
    background: #020617;
    padding: 20px;
    text-align: center;
    color: #38bdf8;
    font-size: 32px;
}

.sub {
    color: #cbd5f5;
    font-size: 14px;
}

/* TOP BAR */
.top-bar {
    text-align: center;
    background: #020617;
    color: white;
    padding: 10px;
    font-weight: bold;
}

/* HERO */
.hero {
    text-align: center;
    padding: 10px;
}

.hero a {
    padding: 10px 15px;
    margin: 5px;
    display: inline-block;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
}

.btn-blue { background: #38bdf8; color: black; }
.btn-yellow { background: #facc15; color: black; }

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

/* CATEGORY */
.category {
    font-size: 24px;
    font-weight: bold;
    margin-top: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0;
}

.card-top {
    display: flex;
    justify-content: space-between;
    font-size: 18px;
    font-weight: bold;
}

.desc {
    font-size: 14px;
    margin-top: 5px;
}

/* QTY */
.qty {
    margin-top: 8px;
}

.qty button {
    width: 30px;
    height: 30px;
    background: #1e40af;
    color: white;
    border: none;
}

.qty span {
    margin: 0 10px;
}

/* CART */
.cart {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

.total {
    font-size: 20px;
    font-weight: bold;
    margin-top: 10px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    background: #1e40af;
    color: white;
    border: none;
    margin-top: 10px;
}

</style>
</head>

<body>

<header>
Home Spice Catering
<div class="sub">Powered by Trina’s Cloud Kitchen</div>
</header>

<div class="top-bar">
⏱ 3PM – 8PM • Sunday & Monday CLOSED • Delivery Only
</div>

<div class="hero">
<a href="https://wa.me/441726806556?text=Event%20Catering%20Enquiry" class="btn-blue">Book Event Catering</a>
<a href="#" onclick="openStory()" class="btn-yellow">Our Story</a>
</div>

<div class="container">

<div id="menu"></div>

<div class="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<div class="total">Total: £<span id="total">0</span></div>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Delivery Address">

<button class="btn" onclick="sendWhatsApp()">Place Order</button>
</div>

</div>

<!-- STORY -->
<div id="storyModal" style="display:none; position:fixed; background:rgba(0,0,0,0.7); width:100%; height:100%; top:0;">
<div style="background:white; margin:10% auto; padding:20px; width:80%;">
<span onclick="closeStory()" style="float:right; cursor:pointer;">X</span>
<h3>Our Story</h3>
<p>
This is not restaurant food. This is food made with heart, tradition, and love — just like home.
</p>
</div>
</div>

<script>

let menu = [

{cat:"🍚 Rice Dishes",name:"Traditional Basmati Rice",price:3,desc:"Light fluffy basmati rice"},
{cat:"🍚 Rice Dishes",name:"Home Style Pilau Rice",price:3.5,desc:"Fragrant spiced rice"},

{cat:"🍗 Main Dishes",name:"Akhni Chicken",price:10,desc:"Slow cooked chicken"},
{cat:"🍗 Main Dishes",name:"Lamb Tehari",price:11,desc:"Spiced lamb rice"},
{cat:"🍗 Main Dishes",name:"Murogh Roast",price:11,desc:"Roasted drumstick"},
{cat:"🍗 Main Dishes",name:"Lamb Rezala",price:11,desc:"Creamy curry"},
{cat:"🍗 Main Dishes",name:"Aloo Bhuna",price:11,desc:"Thick curry"},
{cat:"🍗 Main Dishes",name:"Fish Jhol",price:9,desc:"Fish curry"},
{cat:"🍗 Main Dishes",name:"Dim Bhuna",price:9,desc:"Egg curry"},

{cat:"🥔 Vegetarian & Sides",name:"Aloo Bhajee",price:4,desc:"Fried potatoes"},
{cat:"🥔 Vegetarian & Sides",name:"Sobji Bhuna",price:7.5,desc:"Mixed veg"},
{cat:"🥔 Vegetarian & Sides",name:"Begun Bhaje",price:4,desc:"Aubergine"},

{cat:"🍮 Desserts",name:"Egg Pudding",price:5,desc:"Caramel pudding"},
{cat:"🍮 Desserts",name:"Gulab Jamun",price:10,desc:"Sweet dumplings"},
{cat:"🍮 Desserts",name:"Rasmalai",price:10,desc:"Milk dessert"},
{cat:"🍮 Desserts",name:"Birthday Cake",price:25,desc:"Custom cake"},

{cat:"🥟 Snacks",name:"Chicken Samosa",price:3,desc:"Pastry"},
{cat:"🥟 Snacks",name:"Peyaju",price:3,desc:"Fritter"},
{cat:"🥟 Snacks",name:"Spring Roll",price:3,desc:"Roll"},
{cat:"🥟 Snacks",name:"Murogh Pastry",price:3,desc:"Pastry"},
{cat:"🥟 Snacks",name:"Paratha",price:1.5,desc:"Flatbread"}

];

let cart = {};

function loadMenu(){
let html="";
let currentCat="";

menu.forEach(item=>{

if(item.cat!==currentCat){
currentCat=item.cat;
html+=`<div class="category">${item.cat}</div>`;
}

html+=`
<div class="card">
<div class="card-top">
<span>${item.name}</span>
<span>£${item.price}</span>
</div>
<div class="desc">${item.desc}</div>

<div class="qty">
<button onclick="update('${item.name}',-1)">-</button>
<span id="${item.name}">0</span>
<button onclick="update('${item.name}',1)">+</button>
</div>
</div>`;
});

document.getElementById("menu").innerHTML=html;
}

function update(name,val){
let el=document.getElementById(name);
let qty=parseInt(el.innerText)+val;
if(qty<0) qty=0;
el.innerText=qty;
cart[name]=qty;
renderCart();
}

function renderCart(){
let html="";
let total=0;

menu.forEach(item=>{
let qty=cart[item.name]||0;
if(qty>0){
html+=`${item.name} x ${qty}<br>`;
total+=qty*item.price;
}
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total.toFixed(2);
}

function sendWhatsApp(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let msg=`New Order:%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}%0A%0AItems:%0A`;

for(let item in cart){
if(cart[item]>0){
msg+=`${item} x ${cart[item]}%0A`;
}
}

msg+=`%0ATotal £${document.getElementById("total").innerText}`;

window.open(`https://wa.me/441726806556?text=${msg}`);
}

function openStory(){
document.getElementById("storyModal").style.display="block";
}

function closeStory(){
document.getElementById("storyModal").style.display="none";
}

loadMenu();

</script>

</body>
</html>
