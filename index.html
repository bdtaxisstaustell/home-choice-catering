<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Spice Catering</title>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #b0e0e6;
}

/* HEADER */
header {
    background: #020617;
    padding: 25px;
    text-align: center;
}

header h1 {
    color: #38bdf8;
    font-size: 34px;
    margin: 0;
}

.sub {
    color: #cbd5f5;
    font-size: 16px;
}

/* INFO BAR */
.info-bar {
    text-align: center;
    background: #020617;
    color: white;
    padding: 12px;
    font-size: 18px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* CATEGORY */
.category-title {
    font-size: 26px;
    font-weight: bold;
    margin-top: 25px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 12px;
}

.card-title {
    font-size: 20px;
    font-weight: bold;
}

.card-desc {
    font-size: 16px;
    margin-top: 5px;
}

.price {
    font-weight: bold;
    margin-top: 5px;
}

/* QTY */
.qty button {
    width: 30px;
    height: 30px;
    background: #1e40af;
    color: white;
    border: none;
}

.qty span {
    margin: 0 10px;
    font-size: 18px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 15px;
    background: #1e40af;
    color: white;
    border: none;
    margin-top: 15px;
    font-size: 16px;
}

/* FORM */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
}

/* SUMMARY */
.summary {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    font-size: 16px;
}

</style>
</head>

<body>

<header>
<h1>Home Spice Catering</h1>
<div class="sub">Powered by Trina’s Cloud Kitchen</div>
</header>

<div class="info-bar">
⏱ 3PM – 8PM • Sunday & Monday CLOSED • Delivery Only
</div>

<div class="container">

<h2 style="font-size:28px;">Menu</h2>
<div id="menu"></div>

<button class="btn" onclick="showForm()">Continue Order</button>

<div id="form" style="display:none;">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="miles" placeholder="Distance (miles)">

<button class="btn" onclick="generateSummary()">Review Order</button>
</div>

<div id="summaryBox" class="summary" style="display:none;"></div>
<button id="orderBtn" class="btn" style="display:none;" onclick="placeOrder()">Place Order</button>

<hr>

<h2>📊 Admin Dashboard</h2>
<button class="btn" onclick="loadOrders()">View Orders</button>
<div id="orders"></div>

</div>

<script>

let menuData = {

"🍚 Rice Dishes":[
{name:"Traditional Basmati Rice",price:3,desc:"Light, fluffy long-grain basmati rice."},
{name:"Home Style Pilau Rice",price:3.5,desc:"Fragrant rice with mild spices."}
],

"🍗 Main Dishes":[
{name:"Akhni Chicken",price:10,desc:"Slow-cooked chicken and rice."},
{name:"Lamb Tehari",price:11,desc:"Spiced rice with tender lamb."},
{name:"Murogh Roast",price:11,desc:"Roasted chicken drumstick."},
{name:"Lamb Rezala",price:11,desc:"Creamy mild lamb curry."},
{name:"Aloo Bhuna",price:11,desc:"Thick spiced meat with potatoes."},
{name:"Fish Jhol",price:9,desc:"Light fish curry."},
{name:"Dim Bhuna",price:9,desc:"Egg curry in rich gravy."}
],

"🥔 Vegetarian & Sides":[
{name:"Aloo Bhajee",price:4,desc:"Stir-fried potatoes."},
{name:"Sobji Bhuna",price:7.5,desc:"Mixed veg bhuna."},
{name:"Begun Bhaje",price:4,desc:"Fried aubergine."}
],

"🍮 Desserts":[
{name:"Egg Pudding",price:5,desc:"Creamy caramel pudding."},
{name:"Gulab Jamun",price:10,desc:"Sweet syrup dumplings."},
{name:"Rasmalai",price:10,desc:"Soft cheese in milk."},
{name:"Birthday Cake",price:25,desc:"Custom celebration cake."}
],

"🥟 Snacks":[
{name:"Chicken Samosa",price:3,desc:"Crispy filled pastry."},
{name:"Peyaju",price:3,desc:"Lentil fritters."},
{name:"Spring Roll",price:3,desc:"Crunchy rolls."},
{name:"Murogh Pastry",price:3,desc:"Chicken pastry."},
{name:"Paratha",price:1.5,desc:"Layered flatbread."}
]

};

let cart = {};

function loadMenu(){
let html="";

for(let category in menuData){

html += `<div class="category-title">${category}</div>`;

menuData[category].forEach(item=>{

html+=`
<div class="card">
<div class="card-title">${item.name} (£${item.price})</div>
<div class="card-desc">${item.desc}</div>

<div class="qty">
<button onclick="changeQty('${item.name}',-1)">-</button>
<span id="${item.name}">0</span>
<button onclick="changeQty('${item.name}',1)">+</button>
</div>
</div>`;
});
}

document.getElementById("menu").innerHTML=html;
}

function changeQty(item,val){
let el=document.getElementById(item);
let num=parseInt(el.innerText)+val;
if(num<0) num=0;
el.innerText=num;
cart[item]=num;
}

function showForm(){
document.getElementById("form").style.display="block";
}

function calculateTotal(){
let total=0;

for(let category in menuData){
menuData[category].forEach(item=>{
let qty=cart[item.name]||0;
total += qty * item.price;
});
}
return total;
}

function deliveryFee(miles){
miles=parseFloat(miles);
if(miles<=2) return 2;
if(miles<=5) return 4;
if(miles<=10) return 6;
return 10;
}

function generateSummary(){

let miles=document.getElementById("miles").value;

let food=calculateTotal();
let delivery=deliveryFee(miles);
let total=food+delivery;

let html="<h3>Order Summary</h3>";

for(let item in cart){
if(cart[item]>0){
html+=`${item} x ${cart[item]}<br>`;
}
}

html+=`<hr>
Food: £${food.toFixed(2)}<br>
Delivery: £${delivery.toFixed(2)}<br>
<b>Total: £${total.toFixed(2)}</b>`;

document.getElementById("summaryBox").innerHTML=html;
document.getElementById("summaryBox").style.display="block";
document.getElementById("orderBtn").style.display="block";
}

function placeOrder(){

let order={
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value,
cart:cart,
total:calculateTotal()
};

let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

alert("Order saved!");
}

function loadOrders(){

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

let html="";

orders.forEach((o,i)=>{
html+=`
<div class="card">
<b>Order ${i+1}</b><br>
${o.name}<br>
${o.phone}<br>
${o.address}<br>
Total: £${o.total}
</div>`;
});

document.getElementById("orders").innerHTML=html;
}

loadMenu();

</script>

</body>
</html>
