<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>
body { font-family: Arial; padding:20px; background:#f8f5f0; }
.box { background:white; padding:20px; border-radius:10px; max-width:500px; margin:auto; }
button { background:#c0392b; color:white; padding:10px; width:100%; border:none; }
</style>
</head>

<body>

<div class="box">
<h2>Checkout</h2>

<div id="order"></div>
<h3>Total: £<span id="total"></span></h3>

<input placeholder="Your Name"><br><br>
<input placeholder="Phone"><br><br>
<input placeholder="Address"><br><br>

<button onclick="placeOrder()">Place Order</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item=>{
    document.getElementById("order").innerHTML += `<p>${item.name} - £${item.price}</p>`;
    total += item.price;
});

document.getElementById("total").innerText = total.toFixed(2);

function placeOrder(){
    alert("Order placed! (Demo)");
    localStorage.removeItem("cart");
    window.location.href = "index.html";
}
</script>

</body>
</html>
